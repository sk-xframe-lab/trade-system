[alembic]
script_location = alembic
prepend_sys_path = .
# DATABASE_URL_SYNC は env.py で環境変数から上書きするため、ここはプレースホルダー
sqlalchemy.url = postgresql+psycopg2://trade:trade_secret@postgres:5432/trade_db

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
