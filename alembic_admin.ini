# alembic_admin.ini — 管理画面 DB (admin_db) 専用 Alembic 設定
#
# 使用方法:
#   alembic -c alembic_admin.ini upgrade head   # admin_db を最新に
#   alembic -c alembic_admin.ini current        # 現在の revision 確認
#   alembic -c alembic_admin.ini history        # migration 履歴
#   alembic -c alembic_admin.ini downgrade -1   # 1 つ前に戻す
#
# Docker 環境:
#   docker compose exec trade_app alembic -c alembic_admin.ini upgrade head
#   または
#   docker run --rm --network trade-system_default \
#     -v /home/opc/trade-system:/app -w /app \
#     -e ADMIN_DATABASE_URL_SYNC="postgresql+psycopg2://trade:trade_secret@postgres:5432/trade_db" \
#     python:3.11-slim bash -c "pip install alembic psycopg2-binary sqlalchemy asyncpg pydantic pydantic-settings --quiet && alembic -c alembic_admin.ini upgrade head"
#
# NOTE: ADMIN_DATABASE_URL_SYNC 環境変数が設定されている場合、
#       sqlalchemy.url の値はその環境変数で上書きされる（env.py 参照）。

[alembic]
script_location = alembic_admin
# デフォルト接続文字列（env.py で ADMIN_DATABASE_URL_SYNC 環境変数が優先される）
sqlalchemy.url = postgresql+psycopg2://trade:trade_secret@postgres:5432/trade_db
# NOTE: バージョン管理テーブルは alembic_version_admin を使用する（trade_db の alembic_version と分離）
# version_table は env.py の context.configure() で設定する

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
